<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>一周做事表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--text2:#6c757d;--text3:#adb5bd;
  --border:#e8eaed;--accent:#5B7FFF;--accent2:#8B5CF6;--accent-light:#eef1ff;
  --cat-work:#4A90D9;--cat-study:#2ECC71;--cat-fun:#F39C12;
  --cat-life:#9B59B6;--cat-exercise:#1ABC9C;--cat-other:#95A5A6;
  --row-h:44px;--safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh}

/* === HEADER === */
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.hdr h1{font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.wnav{display:flex;align-items:center;gap:4px}
.wnav button{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .2s}
.wnav button:active{transform:scale(.95)}
.wnav button:hover{border-color:var(--accent);color:var(--accent)}
.wlbl{font-size:12px;font-weight:500;min-width:0;text-align:center;cursor:pointer;padding:4px 6px;border-radius:6px;white-space:nowrap}
.hdr-r{display:flex;align-items:center;gap:6px;flex-shrink:0}
.badge{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap}
.badge.cloud{background:#e8f5e9;color:#2e7d32}
.badge.local{background:#fff3e0;color:#e65100}
.btn-s{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;display:flex;align-items:center;gap:3px;transition:opacity .2s}
.btn-s:active{opacity:.7}
.btn-s.pri{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-s.ghost{background:none;border:1px solid var(--border);color:var(--text2)}

/* === LEGEND === */
.leg{display:flex;gap:8px;padding:6px 14px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.leg-i{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text2)}
.leg-d{width:7px;height:7px;border-radius:2px}

/* === TABS (mobile: day view) === */
.dtabs{display:none;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.dtabs::-webkit-scrollbar{display:none}
.dtabs-inner{display:flex;min-width:100%}
.dtab{flex:1;min-width:0;text-align:center;padding:8px 4px 6px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;-webkit-user-select:none;user-select:none}
.dtab.active{border-bottom-color:var(--accent);background:var(--accent-light)}
.dtab .dn{font-size:10px;color:var(--text2)}
.dtab .dd{font-size:13px;font-weight:600;margin:1px 0}
.dtab .dm{font-size:14px}
.dtab .dw{font-size:10px;color:var(--text2);margin-top:1px}

/* === GRID (desktop: week view) === */
.gw{padding:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.gc{min-width:780px;background:var(--card);border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.05);overflow:hidden}
.dh-row{display:grid;grid-template-columns:40px repeat(7,1fr);border-bottom:2px solid var(--border);background:#fafbfc}
.dh{padding:6px 2px 4px;text-align:center;border-left:1px solid var(--border)}
.dh.today{background:var(--accent-light)}
.dh .dn{font-size:10px;color:var(--text2)}
.dh .dd{font-size:12px;font-weight:600;margin:1px 0}
.dh .dw{font-size:9px;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:2px;margin-top:1px}
.dh .dm{font-size:13px;cursor:pointer;display:inline-block}
.dh .dm:hover{transform:scale(1.2)}
.cc{border-right:1px solid var(--border)}
.sa{overflow-y:auto;max-height:calc(100vh - 140px);max-height:calc(100dvh - 140px);position:relative}
.tg{display:grid;grid-template-columns:40px repeat(7,1fr);position:relative}
.tl{height:var(--row-h);display:flex;align-items:flex-start;justify-content:center;font-size:9px;color:var(--text3);border-right:1px solid var(--border);border-bottom:1px solid #f5f5f5;padding-top:2px;user-select:none}
.dcol{position:relative;border-left:1px solid var(--border)}
.hl{height:var(--row-h);border-bottom:1px solid #f5f5f5;cursor:pointer;transition:background .1s}
.hl:hover{background:rgba(91,127,255,.04)}

/* === MOBILE DAY VIEW === */
.mday{display:none;padding:10px}
.mday-grid{background:var(--card);border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.05);overflow:hidden}
.mday-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mday-hdr .mdh-l{font-size:15px;font-weight:600}
.mday-hdr .mdh-r{display:flex;align-items:center;gap:8px}
.mday-hdr .mdh-weather{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:3px}
.mday-hdr .mdh-mood{font-size:20px;cursor:pointer}
.mtime{display:grid;grid-template-columns:44px 1fr;position:relative}
.mtl{height:var(--row-h);display:flex;align-items:flex-start;justify-content:center;font-size:10px;color:var(--text3);border-right:1px solid var(--border);border-bottom:1px solid #f5f5f5;padding-top:2px;user-select:none}
.mcol{position:relative;border-bottom:1px solid #f5f5f5}
.mcol:active{background:rgba(91,127,255,.03)}

/* === ACTIVITY BLOCKS === */
.ab{position:absolute;left:3px;right:3px;border-radius:5px;padding:3px 7px;font-size:11px;cursor:pointer;overflow:hidden;z-index:2;transition:box-shadow .2s;border-left:3px solid;line-height:1.3}
.ab:hover{box-shadow:0 3px 10px rgba(0,0,0,.12);z-index:5}
.ab:active{transform:scale(.98)}
.ab .an{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ab .at{font-size:9px;opacity:.75}
.ab .am{position:absolute;top:2px;right:4px;font-size:10px}
.ab .ad{position:absolute;bottom:2px;right:4px;width:4px;height:4px;border-radius:50%;background:rgba(0,0,0,.25)}

/* Time now */
.tn{position:absolute;left:40px;right:0;height:2px;background:#FF4757;z-index:3;pointer-events:none}
.tn::before{content:'';position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:#FF4757}

/* === MODALS === */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.mo.active{display:flex}
.md{background:var(--card);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:440px;max-height:85vh;max-height:85dvh;overflow-y:auto;animation:mIn .25s ease}
@keyframes mIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}
.md h2{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.cb{width:28px;height:28px;border-radius:50%;border:none;background:#f0f0f0;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.cb:hover{background:#e0e0e0}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:500;margin-bottom:4px;color:var(--text2)}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:50px}
.fr{display:flex;gap:8px}
.fr .fg{flex:1}
.co{display:flex;flex-wrap:wrap;gap:5px}
.co-i{padding:5px 11px;border-radius:14px;font-size:11px;font-weight:500;cursor:pointer;border:2px solid transparent;transition:all .12s;user-select:none}
.co-i:active{transform:scale(.95)}
.co-i.sel{border-color:rgba(0,0,0,.3)}
.moo{display:flex;gap:5px;flex-wrap:wrap}
.mo-i{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:2px solid transparent;transition:all .12s;background:#f8f9fa}
.mo-i:active{transform:scale(.9)}
.mo-i.sel{border-color:var(--accent);background:var(--accent-light)}
.bg{display:flex;gap:8px;margin-top:14px}
.b{padding:9px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.b:active{transform:scale(.95)}
.b-p{background:var(--accent);color:#fff}
.b-d{background:#FF4757;color:#fff}
.b-s{background:#f0f0f0;color:var(--text2)}

/* Calendar popup */
.calpop{background:var(--card);border-radius:16px 16px 0 0;padding:16px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto;animation:mIn .25s ease}
.cal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-h span{font-size:14px;font-weight:600}
.cal-h button{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text2);padding:6px;border-radius:4px}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-g .cw{font-size:10px;color:var(--text3);padding:3px 0}
.cal-g .cd{font-size:12px;padding:6px 0;border-radius:6px;cursor:pointer;transition:all .12s;position:relative}
.cal-g .cd:active{transform:scale(.9)}
.cal-g .cd.om{color:var(--text3)}
.cal-g .cd.td{font-weight:700;color:var(--accent)}
.cal-g .cd.sl{background:var(--accent);color:#fff}
.cal-g .cd.hd::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-g .cd.sl.hd::after{background:#fff}

/* Mood popup */
.mpop{position:fixed;z-index:50;background:var(--card);border-radius:10px;padding:8px;box-shadow:0 6px 20px rgba(0,0,0,.12);display:none;flex-wrap:wrap;gap:3px;width:170px}
.mpop.active{display:flex}
.mpop .mp{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:transform .12s;border:2px solid transparent}
.mpop .mp:active{transform:scale(.85)}
.mpop .mpc{font-size:11px;color:var(--text2);background:#f0f0f0}

/* Stats */
.sp{background:var(--card);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:700px;max-height:85vh;max-height:85dvh;overflow-y:auto;animation:mIn .25s ease}
.sp h2{font-size:16px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sc{background:#f8f9fa;border-radius:10px;padding:14px}
.sc h3{font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text2)}
.sc canvas{width:100%!important;height:auto!important}
.ss{margin-top:14px;background:linear-gradient(135deg,var(--accent-light),#f0e6ff);border-radius:10px;padding:14px}
.ss h3{font-size:12px;font-weight:600;margin-bottom:8px}
.si{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px}
.si-i{text-align:center;padding:8px;background:var(--card);border-radius:7px}
.si-i .v{font-size:18px;font-weight:700;color:var(--accent)}
.si-i .l{font-size:9px;color:var(--text2);margin-top:2px}
.csl{list-style:none}
.csl li{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.csl li:last-child{border:none}
.csl .cc2{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.csl .cn{flex:1}.csl .ch{font-weight:600}.csl .cp{color:var(--text2);font-size:10px;min-width:32px;text-align:right}
.ms{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.mc{display:flex;align-items:center;gap:3px;font-size:12px;padding:3px 8px;background:var(--card);border-radius:14px}
.mc span{font-weight:600}

/* Settings */
.setp .fg{margin-bottom:10px}
.setp .ht{font-size:9px;color:var(--text3);margin-top:2px;line-height:1.3}
.setsec{border-top:1px solid var(--border);padding-top:10px;margin-top:10px}
.setsec h3{font-size:12px;font-weight:600;margin-bottom:6px;color:var(--accent)}
.bsm{padding:5px 12px;font-size:11px;border-radius:6px;cursor:pointer;border:none;font-weight:500}
.bsm.p{background:var(--accent);color:#fff}
.bsm.w{background:#FF4757;color:#fff}
.bsm.g{background:#f0f0f0;color:var(--text2)}
.sd{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px}
.sd.ok{background:#2ECC71}.sd.no{background:#FF4757}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:7px 18px;border-radius:20px;font-size:12px;z-index:300;animation:tIn .3s ease;pointer-events:none;white-space:nowrap}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* === MOBILE RESPONSIVE === */
@media(max-width:768px){
  .hdr{padding:8px 10px;gap:6px}
  .hdr h1{font-size:14px}
  .wnav button{padding:3px 8px;font-size:11px}
  .wlbl{font-size:11px}
  .badge{font-size:9px;padding:1px 5px}
  .btn-s{padding:5px 10px;font-size:11px}
  .leg{padding:4px 10px;gap:6px}
  .leg-i{font-size:9px}
  /* Show day tabs, hide week grid */
  .dtabs{display:block}
  .gw{display:none}
  .mday{display:block}
  /* Modal full width */
  .md,.calpop,.sp{border-radius:16px 16px 0 0;max-width:100%;width:100%}
  .sg{grid-template-columns:1fr}
}
@media(min-width:769px){
  .dtabs{display:none}
  .mday{display:none}
  .gw{display:block}
}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:center;gap:8px;min-width:0">
    <h1>📋 一周做事表</h1>
    <div class="wnav">
      <button onclick="chWeek(-1)">◀</button>
      <span class="wlbl" id="wlbl" onclick="openCal()"></span>
      <button onclick="chWeek(1)">▶</button>
    </div>
    <span class="badge local" id="sbadge">📁 本地</span>
  </div>
  <div class="hdr-r">
    <button class="btn-s ghost" onclick="openSet()">⚙️</button>
    <button class="btn-s pri" onclick="showSt()">📊</button>
  </div>
</div>

<div class="leg" id="leg"></div>

<!-- Mobile Day Tabs -->
<div class="dtabs" id="dtabs"><div class="dtabs-inner" id="dtabsIn"></div></div>

<!-- Desktop Week View -->
<div class="gw"><div class="gc">
  <div class="dh-row" id="dhRow"></div>
  <div class="sa" id="sa"><div class="tg" id="tg"></div><div class="tn" id="tnl" style="display:none"></div></div>
</div></div>

<!-- Mobile Day View -->
<div class="mday" id="mday"></div>

<!-- Act Modal -->
<div class="mo" id="aMo">
  <div class="md">
    <h2><span id="mTi">添加事项</span><button class="cb" onclick="clAM()">✕</button></h2>
    <input type="hidden" id="eId"><input type="hidden" id="eDt">
    <div class="fg"><label>事项名称</label><input id="aNm" placeholder="写周报、读论文…"></div>
    <div class="fg"><label>分类</label><div class="co" id="cOpt"></div></div>
    <div class="fr">
      <div class="fg"><label>开始时间</label><select id="aSt"></select></div>
      <div class="fg"><label>结束时间</label><select id="aEn"></select></div>
    </div>
    <div class="fg"><label>心情</label><div class="moo" id="mOpt"></div></div>
    <div class="fg"><label>备注</label><textarea id="aNt" placeholder="添加备注…"></textarea></div>
    <div class="bg">
      <button class="b b-p" onclick="saveAct()">保存</button>
      <button class="b b-d" id="dBt" onclick="delAct()" style="display:none">删除</button>
      <button class="b b-s" onclick="clAM()">取消</button>
    </div>
  </div>
</div>

<!-- Calendar -->
<div class="mo" id="calOv" onclick="clCal(event)">
  <div class="calpop" onclick="event.stopPropagation()">
    <div class="cal-h"><button onclick="calP()">◀</button><span id="calTi"></span><button onclick="calN()">▶</button></div>
    <div class="cal-g" id="calG"></div>
  </div>
</div>

<!-- Mood Popup -->
<div class="mpop" id="mpop"></div>

<!-- Stats -->
<div class="mo" id="stOv">
  <div class="sp">
    <h2><span>📊 本周统计</span><button class="cb" onclick="clSt()">✕</button></h2>
    <div class="sg">
      <div class="sc"><h3>分类时间分布</h3><canvas id="pieC" width="260" height="260"></canvas></div>
      <div class="sc"><h3>分类明细</h3><ul class="csl" id="csL"></ul></div>
      <div class="sc"><h3>每日时长</h3><canvas id="barC" width="260" height="180"></canvas></div>
      <div class="sc"><h3>心情概览</h3><div class="ms" id="mSum"></div></div>
    </div>
    <div class="ss"><h3>本周总结</h3><div class="si" id="sumI"></div></div>
  </div>
</div>

<!-- Settings -->
<div class="mo" id="setOv">
  <div class="md setp">
    <h2><span>⚙️ 设置</span><button class="cb" onclick="clSet()">✕</button></h2>
    <div class="setsec">
      <h3>☁️ 跨设备同步（Supabase）</h3>
      <div class="fg"><label>Supabase URL</label><input id="sbU" placeholder="https://xxxx.supabase.co"></div>
      <div class="fg"><label>Anon Key</label><input id="sbK" placeholder="eyJ…"></div>
      <div id="sbS" style="font-size:11px;margin-bottom:6px"></div>
      <button class="bsm p" onclick="connSB()">连接并同步</button>
      <button class="bsm g" onclick="disSB()" style="margin-left:4px">断开</button>
      <p class="ht">注册 supabase.com 免费，创建项目后获取 URL 和 Key</p>
    </div>
    <div class="setsec">
      <h3>🌤️ 天气</h3>
      <div class="fg"><label>和风天气 API Key</label><input id="wK" placeholder="dev.qweather.com 免费获取"></div>
      <div class="fg"><label>城市</label>
        <div style="display:flex;gap:4px"><input id="wC" placeholder="济南" style="flex:1"><button class="bsm p" onclick="srcCity()">搜索</button></div>
      </div>
      <div id="cRes" style="font-size:11px;margin-bottom:6px"></div>
      <div id="wS" style="font-size:11px;margin-bottom:6px"></div>
      <p class="ht">免费注册 dev.qweather.com 获取 Key</p>
    </div>
    <div class="setsec">
      <h3>📦 数据</h3>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="bsm g" onclick="expD()">导出</button>
        <button class="bsm g" onclick="document.getElementById('impF').click()">导入</button>
        <input type="file" id="impF" accept=".json" style="display:none" onchange="impD(event)">
        <button class="bsm w" onclick="clrD()">清空</button>
      </div>
    </div>
  </div>
</div>

<script>
const CATS=[{key:'work',name:'工作',color:'#4A90D9'},{key:'study',name:'学习',color:'#2ECC71'},{key:'fun',name:'娱乐',color:'#F39C12'},{key:'life',name:'生活',color:'#9B59B6'},{key:'exercise',name:'运动',color:'#1ABC9C'},{key:'other',name:'其他',color:'#95A5A6'}];
const MOODS=[{key:'happy',emoji:'😊',name:'开心'},{key:'calm',emoji:'😌',name:'平静'},{key:'focused',emoji:'🧐',name:'专注'},{key:'tired',emoji:'😴',name:'疲惫'},{key:'anxious',emoji:'😰',name:'焦虑'},{key:'sad',emoji:'😢',name:'低落'},{key:'upset',emoji:'😤',name:'烦躁'}];
const WD=['周一','周二','周三','周四','周五','周六','周日'];
const WDS=['一','二','三','四','五','六','日'];
const RH=44,TH=24;
const WIC={100:'☀️',101:'🌤️',102:'⛅',103:'🌥️',104:'☁️',300:'🌧️',301:'⛈️',305:'🌦️',306:'🌧️',307:'🌧️',400:'🌨️',500:'🌫️',501:'🌫️',502:'🌫️'};

let cWk=getMon(new Date()),calM=new Date(),mobDay=0;
let D=loadL(),WD2={},sbc=null,sCat='work',sMood='',cfg=getCfg();

function getMon(d){d=new Date(d);const day=d.getDay();return new Date(d.getFullYear(),d.getMonth(),d.getDate()-day+(day===0?-6:1))}
function fD(d){return d.getFullYear()+'-'+S(d.getMonth()+1)+'-'+S(d.getDate())}
function fDC(d){return(d.getMonth()+1)+'/'+d.getDate()}
function S(n){return String(n).padStart(2,'0')}
function wDates(m){const r=[];for(let i=0;i<7;i++){const d=new Date(m);d.setDate(d.getDate()+i);r.push(d)}return r}
function wStr(m){const s=new Date(m);s.setDate(s.getDate()+6);return fDC(m)+' — '+fDC(s)}
function gId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function isTd(d){return fD(d)===fD(new Date())}
function mT(m){return S(Math.floor(m/60))+':'+S(m%60)}
function toast(s){const e=document.createElement('div');e.className='toast';e.textContent=s;document.body.appendChild(e);setTimeout(()=>e.remove(),2200)}
function loadL(){try{return JSON.parse(localStorage.getItem('wt2'))||{a:[],m:{}}}catch(e){return{a:[],m:{}}}}
function saveL(){localStorage.setItem('wt2',JSON.stringify(D))}
function dayA(ds){return D.a.filter(a=>a.date===ds).sort((a,b)=>a.s-a.e)}
function wkA(m){const ds=wDates(m).map(fD);return D.a.filter(a=>ds.includes(a.date))}
function getM(ds){return D.m[ds]||''}
function setM(ds,m){if(m)D.m[ds]=m;else delete D.m[ds];saveL();syncU()}
function getCfg(){try{return JSON.parse(localStorage.getItem('wt2_cfg'))||{}}catch(e){return{}}}
function saveCfg(){localStorage.setItem('wt2_cfg',JSON.stringify(cfg))}
function isMob(){return window.innerWidth<=768}

// Supabase
function initSB(){if(!cfg.su||!cfg.sk){sbc=null;return}try{sbc=supabase.createClient(cfg.su,cfg.sk)}catch(e){sbc=null}}
async function syncD(){if(!sbc)return;try{const{data:d1}=await sbc.from('activities').select('*');const{data:d2}=await sbc.from('day_moods').select('*');if(d1)D.a=d1.map(r=>({id:r.id,date:r.date,name:r.name,cat:r.category,s:r.start_min,e:r.end_min,mood:r.mood,notes:r.notes}));if(d2)D.m=Object.fromEntries(d2.map(r=>[r.date,r.mood]));saveL();render()}catch(e){console.error(e)}}
async function syncU(){if(!sbc)return;try{const rows=D.a.map(a=>({id:a.id,date:a.date,name:a.name,category:a.cat,start_min:a.s,end_min:a.e,mood:a.mood||null,notes:a.notes||null}));if(rows.length)await sbc.from('activities').upsert(rows,{onConflict:'id'});const mr=Object.entries(D.m).map(([date,mood])=>({date,mood}));if(mr.length)await sbc.from('day_moods').upsert(mr,{onConflict:'date'})}catch(e){console.error(e)}}
async function connSB(){const u=document.getElementById('sbU').value.trim(),k=document.getElementById('sbK').value.trim();if(!u||!k){toast('请填写 URL 和 Key');return}cfg.su=u;cfg.sk=k;saveCfg();initSB();if(sbc){try{await sbc.from('activities').select('id').limit(1);document.getElementById('sbS').innerHTML='<span class="sd ok"></span>已连接';await syncD();toast('同步完成 ✓')}catch(e){document.getElementById('sbS').innerHTML='<span class="sd no"></span>数据表未创建'}}updBadge()}
function disSB(){cfg.su='';cfg.sk='';saveCfg();sbc=null;updBadge();document.getElementById('sbS').innerHTML='<span class="sd no"></span>未连接';toast('已断开')}
function updBadge(){const b=document.getElementById('sbadge');if(sbc){b.className='badge cloud';b.textContent='☁️ 同步'}else{b.className='badge local';b.textContent='📁 本地'}}

// Weather
async function srcCity(){const k=cfg.wk||document.getElementById('wK').value.trim(),c=document.getElementById('wC').value.trim();if(!k||!c){toast('请填写 Key 和城市');return}cfg.wk=k;saveCfg();try{const r=await fetch(`https://geoapi.qweather.com/v2/city/lookup?location=${encodeURIComponent(c)}&key=${k}`);const d=await r.json();if(d.code==='200'&&d.location.length){document.getElementById('cRes').innerHTML=d.location.slice(0,5).map(l=>`<div style="padding:5px 8px;cursor:pointer;border-radius:4px;margin:2px 0" onclick="selCity('${l.id}','${l.name}')">${l.name} (${l.adm2||l.adm1})</div>`).join('')}else toast('未找到城市')}catch(e){toast('搜索失败')}}
function selCity(id,n){cfg.wl=id;cfg.wn=n;saveCfg();document.getElementById('cRes').innerHTML=`<span class="sd ok"></span>${n}`;document.getElementById('wC').value=n;fetchW()}
async function fetchW(){if(!cfg.wk||!cfg.wl)return;try{const r=await fetch(`https://devapi.qweather.com/v7/weather/7d?location=${cfg.wl}&key=${cfg.wk}`);const d=await r.json();if(d.code==='200'){WD2=Object.fromEntries(d.daily.map(x=>[x.fxDate,x]));render()}}catch(e){}}
function wI(c){return WIC[c]||'🌡️'}

// Render legend
function renderLeg(){document.getElementById('leg').innerHTML=CATS.map(c=>`<div class="leg-i"><div class="leg-d" style="background:${c.color}"></div>${c.name}</div>`).join('')}

// Main render
function render(){
  const dates=wDates(cWk);
  document.getElementById('wlbl').textContent=wStr(cWk);
  renderDTabs(dates);
  if(isMob()){renderMDay(dates)}else{renderWk(dates)}
}

// Mobile Day Tabs
function renderDTabs(dates){
  document.getElementById('dtabsIn').innerHTML=dates.map((d,i)=>{
    const td=isTd(d)?'active':'';
    const me=getM(fD(d));
    const meE=me?MOODS.find(m=>m.key===me)?.emoji||'':'';
    return`<div class="dtab ${i===mobDay?'active':''}" onclick="mobDay=${i};render()"><div class="dn">${WD[i]}</div><div class="dd">${fDC(d)}</div><div class="dm">${meE||''}</div></div>`;
  }).join('');
}

// Mobile Day View
function renderMDay(dates){
  const d=dates[mobDay]||dates[0];
  const ds=fD(d);
  const acts=dayA(ds);
  const me=getM(ds);
  const meE=me?MOODS.find(m=>m.key===me)?.emoji||'':'';
  const w=WD2[ds];
  const wH=w?`<span class="mdh-weather">${wI(w.iconDay)} ${w.tempMin}°~${w.tempMax}°</span>`:'';
  
  let h=`<div class="mday-grid"><div class="mday-hdr"><div class="mdh-l">${WD[mobDay]} ${fDC(d)}</div><div class="mdh-r">${wH}<span class="mdh-mood" onclick="openMP(event,'${ds}')">${meE||'➕'}</span></div></div><div class="mtime" style="position:relative">`;
  for(let hr=0;hr<TH;hr++){
    h+=`<div class="mtl">${S(hr)}:00</div><div class="mcol" ondblclick="openAdd('${ds}',${hr})" ontouchstart="mTouch(event,'${ds}',${hr})"></div>`;
  }
  acts.forEach(a=>{
    const cat=CATS.find(c=>c.key===a.cat)||CATS[5];
    const top=(a.s/60)*RH,bot=(a.e/60)*RH,ht=Math.max(bot-top,18);
    const meE2=a.mood?MOODS.find(m=>m.key===a.mood)?.emoji||'':'';
    const ts=mT(a.s)+'-'+mT(a.e);
    h+=`<div class="ab" style="top:${top}px;height:${ht}px;background:${cat.color}18;border-left-color:${cat.color};color:${cat.color}" onclick="openEdit('${a.id}')" title="${a.name}\n${ts}${a.notes?'\n'+a.notes:''}"><span class="an">${a.name}</span>${ht>26?`<div class="at">${ts}</div>`:''}${meE2?`<span class="am">${meE2}</span>`:''}${a.notes&&ht>36?`<span class="ad"></span>`:''}</div>`;
  });
  h+=`</div></div>`;
  document.getElementById('mday').innerHTML=h;
  updateMNow(ds);
}

let mTouchTimer=null;
function mTouch(e,ds,hr){if(mTouchTimer)clearTimeout(mTouchTimer);mTouchTimer=setTimeout(()=>openAdd(ds,hr),400)}
document.addEventListener('touchend',()=>{if(mTouchTimer){clearTimeout(mTouchTimer);mTouchTimer=null}});

function updateMNow(ds){
  const now=new Date();
  if(fD(now)!==ds)return;
  const cm=now.getHours()*60+now.getMinutes();
  const top=(cm/60)*RH;
  const mtime=document.querySelector('.mtime');
  if(!mtime)return;
  // Add time now line to mobile view
  let nline=mtime.querySelector('.tn');
  if(!nline){nline=document.createElement('div');nline.className='tn';mtime.appendChild(nline)}
  nline.style.top=top+'px';nline.style.left='44px';nline.style.display='block';
}

// Desktop Week View
function renderWk(dates){
  const dhr=document.getElementById('dhRow');
  let hh='<div class="cc"></div>';
  dates.forEach((d,i)=>{
    const td=isTd(d)?'today':'';
    const ds=fD(d);
    const me=getM(ds);const meE=me?MOODS.find(m=>m.key===me)?.emoji||'':'';
    const w=WD2[ds];
    const wH=w?`<div class="dw"><span>${wI(w.iconDay)}</span><span>${w.tempMin}~${w.tempMax}°</span></div>`:'';
    hh+=`<div class="dh ${td}"><div class="dn">${WD[i]}</div><div class="dd">${fDC(d)}</div>${wH}<div class="dm" onclick="openMP(event,'${ds}')">${meE||'➕'}</div></div>`;
  });
  dhr.innerHTML=hh;

  const tg=document.getElementById('tg');
  tg.style.gridTemplateColumns=`40px repeat(7,1fr)`;
  tg.style.gridTemplateRows=`repeat(${TH},${RH}px)`;
  tg.innerHTML='';

  for(let h=0;h<TH;h++){
    const tl=document.createElement('div');tl.className='tl';tl.textContent=S(h)+':00';
    tl.style.gridRow=h+1;tl.style.gridColumn=1;tg.appendChild(tl);
  }

  dates.forEach((d,ci)=>{
    const ds=fD(d),acts=dayA(ds);
    const col=document.createElement('div');col.className='dcol';
    col.style.gridRow='1/-1';col.style.gridColumn=ci+2;col.style.position='relative';
    for(let h=0;h<TH;h++){const l=document.createElement('div');l.className='hl';l.ondblclick=()=>openAdd(ds,h);col.appendChild(l)}
    acts.forEach(a=>{
      const cat=CATS.find(c=>c.key===a.cat)||CATS[5];
      const top=(a.s/60)*RH,bot=(a.e/60)*RH,ht=Math.max(bot-top,18);
      const meE=a.mood?MOODS.find(m=>m.key===a.mood)?.emoji||'':'';
      const ts=mT(a.s)+'-'+mT(a.e);
      const bk=document.createElement('div');bk.className='ab';
      bk.style.cssText=`top:${top}px;height:${ht}px;background:${cat.color}18;border-left-color:${cat.color};color:${cat.color}`;
      bk.onclick=()=>openEdit(a.id);bk.title=a.name+'\n'+ts;
      let inn=`<span class="an">${a.name}</span>`;if(ht>26)inn+=`<div class="at">${ts}</div>`;if(meE)inn+=`<span class="am">${meE}</span>`;if(a.notes&&ht>36)inn+=`<span class="ad"></span>`;
      bk.innerHTML=inn;col.appendChild(bk);
    });
    tg.appendChild(col);
  });
  updateNLine();
}

function updateNLine(){
  const now=new Date(),ds=fD(now),dates=wDates(cWk).map(fD),ci=dates.indexOf(ds);
  const line=document.getElementById('tnl');
  if(ci===-1||isMob()){line.style.display='none';return}
  const cm=now.getHours()*60+now.getMinutes(),top=(cm/60)*RH;
  line.style.display='block';line.style.top=top+'px';
  const tg=document.getElementById('tg'),cols=tg.querySelectorAll('.dcol');
  if(cols[ci]){const cr=cols[ci].getBoundingClientRect(),gr=tg.getBoundingClientRect();line.style.left=(cr.left-gr.left)+'px';line.style.width=cr.width+'px'}
}

function chWeek(dir){cWk=new Date(cWk);cWk.setDate(cWk.getDate()+dir*7);render()}
function goCur(){cWk=getMon(new Date());render();fetchW()}

// Calendar
function openCal(){calM=new Date(cWk);renderCal();document.getElementById('calOv').classList.add('active')}
function clCal(e){if(!e||e.target===document.getElementById('calOv'))document.getElementById('calOv').classList.remove('active')}
function calP(){calM.setMonth(calM.getMonth()-1);renderCal()}
function calN(){calM.setMonth(calM.getMonth()+1);renderCal()}
function renderCal(){
  const y=calM.getFullYear(),m=calM.getMonth();
  document.getElementById('calTi').textContent=y+'年'+(m+1)+'月';
  const g=document.getElementById('calGrid');
  let h=WDS.map(w=>`<div class="cw">${w}</div>`).join('');
  const f=new Date(y,m,1),sd=f.getDay()||7;
  const st=new Date(f);st.setDate(st.getDate()-(sd-1));
  const allD=new Set(D.a.map(a=>a.date));
  for(let i=0;i<42;i++){
    const d=new Date(st);d.setDate(d.getDate()+i);const ds=fD(d);
    let c='cd';if(d.getMonth()!==m)c+=' om';if(isTd(d))c+=' td';if(ds===fD(cWk))c+=' sl';if(allD.has(ds))c+=' hd';
    h+=`<div class="${c}" onclick="jumpWk('${ds}')">${d.getDate()}</div>`;
  }
  g.innerHTML=h;
}
function jumpWk(ds){cWk=getMon(new Date(ds));render();document.getElementById('calOv').classList.remove('active')}

// Act Modal
function bTO(){const s1=document.getElementById('aSt'),s2=document.getElementById('aEn');s1.innerHTML='';s2.innerHTML='';for(let m=0;m<1440;m+=30){const o=`<option value="${m}">${mT(m)}</option>`;s1.innerHTML+=o;s2.innerHTML+=o}}
function bCO(){document.getElementById('cOpt').innerHTML=CATS.map(c=>`<div class="co-i ${c.key===sCat?'sel':''}" style="background:${c.color}18;color:${c.color}" onclick="sCat='${c.key}';bCO()">${c.name}</div>`).join('')}
function bMO(){let h=MOODS.map(m=>`<div class="mo-i ${m.key===sMood?'sel':''}" onclick="sMood='${m.key}';bMO()" title="${m.name}">${m.emoji}</div>`).join('');if(sMood)h+=`<div class="mo-i" onclick="sMood='';bMO()" style="font-size:12px">✕</div>`;document.getElementById('mOpt').innerHTML=h}
function openAdd(ds,h){
  document.getElementById('mTi').textContent='添加事项';document.getElementById('eId').value='';document.getElementById('eDt').value=ds;
  document.getElementById('aNm').value='';document.getElementById('aNt').value='';
  sCat='work';sMood='';bCO();bMO();bTO();
  document.getElementById('aSt').value=h*60;document.getElementById('aEn').value=Math.min((h+1)*60,1440);
  document.getElementById('dBt').style.display='none';document.getElementById('aMo').classList.add('active');
  setTimeout(()=>document.getElementById('aNm').focus(),120);
}
function openEdit(id){
  const a=D.a.find(x=>x.id===id);if(!a)return;
  document.getElementById('mTi').textContent='编辑事项';document.getElementById('eId').value=id;document.getElementById('eDt').value=a.date;
  document.getElementById('aNm').value=a.name;document.getElementById('aNt').value=a.notes||'';
  sCat=a.cat;sMood=a.mood||'';bCO();bMO();bTO();
  document.getElementById('aSt').value=a.s;document.getElementById('aEn').value=a.e;
  document.getElementById('dBt').style.display='inline-block';document.getElementById('aMo').classList.add('active');
}
function clAM(){document.getElementById('aMo').classList.remove('active')}
function saveAct(){
  const nm=document.getElementById('aNm').value.trim();if(!nm){toast('请输入名称');return}
  const ds=document.getElementById('eDt').value,sm=+document.getElementById('aSt').value,em=+document.getElementById('aEn').value;
  if(em<=sm){toast('结束需晚于开始');return}
  const nt=document.getElementById('aNt').value.trim(),id=document.getElementById('eId').value;
  if(id){const i=D.a.findIndex(a=>a.id===id);if(i>=0)D.a[i]={...D.a[i],name:nm,cat:sCat,s:sm,e:em,mood:sMood,notes:nt}}
  else D.a.push({id:gId(),date:ds,name:nm,cat:sCat,s:sm,e:em,mood:sMood,notes:nt});
  saveL();syncU();clAM();render();toast('已保存 ✓');
}
function delAct(){const id=document.getElementById('eId').value;if(!id)return;D.a=D.a.filter(a=>a.id!==id);saveL();syncU();clAM();render();toast('已删除')}

// Mood Popup
function openMP(e,ds){
  e.stopPropagation();
  const pop=document.getElementById('mpop'),cur=getM(ds);
  pop.innerHTML=MOODS.map(m=>`<div class="mp" onclick="setM('${ds}','${m.key}');document.getElementById('mpop').classList.remove('active');render()">${m.emoji}</div>`).join('')+`<div class="mp mpc" onclick="setM('${ds}','');document.getElementById('mpop').classList.remove('active');render()">✕</div>`;
  const r=e.target.getBoundingClientRect();
  pop.style.top=(r.bottom+6)+'px';pop.style.left=Math.max(8,Math.min(r.left-60,window.innerWidth-180))+'px';
  pop.classList.add('active');
}
document.addEventListener('click',()=>document.getElementById('mpop').classList.remove('active'));

// Stats
function showSt(){renderSt();document.getElementById('stOv').classList.add('active')}
function clSt(){document.getElementById('stOv').classList.remove('active')}
function renderSt(){
  const acts=wkA(cWk),dates=wDates(cWk).map(fD);
  const cs={};CATS.forEach(c=>{cs[c.key]={...c,t:0,n:0}});
  acts.forEach(a=>{if(cs[a.cat]){cs[a.cat].t+=(a.e-a.s);cs[a.cat].n++}});
  const tt=Object.values(cs).reduce((s,c)=>s+c.t,0);
  drawPie(cs,tt);
  document.getElementById('csL').innerHTML=CATS.map(c=>{const s=cs[c.key],h=(s.t/60).toFixed(1),p=tt?Math.round(s.t/tt*100):0;return s.t>0?`<li><div class="cc2" style="background:${c.color}"></div><div class="cn">${c.name}(${s.n}项)</div><div class="ch">${h}h</div><div class="cp">${p}%</div></li>`:''}).filter(Boolean).join('')||'<li style="color:var(--text2);font-size:11px">暂无数据</li>';
  const dd=dates.map(d=>acts.filter(a=>a.date===d).reduce((s,a)=>s+(a.e-a.s),0));
  drawBar(dd);
  const mc={};MOODS.forEach(m=>{mc[m.key]={...m,n:0}});acts.forEach(a=>{if(a.mood&&mc[a.mood])mc[a.mood].n++});dates.forEach(d=>{const mk=getM(d);if(mk&&mc[mk])mc[mk].n++});
  document.getElementById('mSum').innerHTML=MOODS.filter(m=>mc[m.key].n>0).map(m=>`<div class="mc">${m.emoji}<span>${mc[m.key].n}</span></div>`).join('')||'<span style="color:var(--text2);font-size:11px">暂无</span>';
  const mc2=Object.values(cs).sort((a,b)=>b.t-a.t)[0],bd=dd.indexOf(Math.max(...dd));
  document.getElementById('sumI').innerHTML=`<div class="si-i"><div class="v">${(tt/60).toFixed(1)}h</div><div class="l">总时长</div></div><div class="si-i"><div class="v">${acts.length}</div><div class="l">事项数</div></div><div class="si-i"><div class="v">${mc2&&mc2.t>0?mc2.name:'-'}</div><div class="l">最多分类</div></div><div class="si-i"><div class="v">${bd>=0?WD[bd]:'-'}</div><div class="l">最忙天</div></div>`;
}
function drawPie(cs,tt){
  const cv=document.getElementById('pieC'),ctx=cv.getContext('2d'),dp=window.devicePixelRatio||1;cv.width=260*dp;cv.height=260*dp;ctx.scale(dp,dp);ctx.clearRect(0,0,260,260);
  if(!tt){ctx.fillStyle='#ccc';ctx.font='12px Noto Sans SC';ctx.textAlign='center';ctx.fillText('暂无数据',130,133);return}
  const cx=130,cy=125,r=82;let sa=-Math.PI/2;
  CATS.forEach(c=>{const s=cs[c.key];if(!s.t)return;const sl=(s.t/tt)*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,sa,sa+sl);ctx.closePath();ctx.fillStyle=c.color;ctx.fill();const p=Math.round(s.t/tt*100);if(p>=5){const ma=sa+sl/2;ctx.fillStyle='#fff';ctx.font='bold 9px Noto Sans SC';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p+'%',cx+Math.cos(ma)*r*.6,cy+Math.sin(ma)*r*.6)}sa+=sl});
  ctx.beginPath();ctx.arc(cx,cy,r*.45,0,Math.PI*2);ctx.fillStyle='#f8f9fa';ctx.fill();ctx.fillStyle='#1a1a2e';ctx.font='bold 15px Noto Sans SC';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText((tt/60).toFixed(1)+'h',cx,cy-4);ctx.fillStyle='#6c757d';ctx.font='9px Noto Sans SC';ctx.fillText('总时长',cx,cy+10);
}
function drawBar(dd){
  const cv=document.getElementById('barC'),ctx=cv.getContext('2d'),dp=window.devicePixelRatio||1;cv.width=260*dp;cv.height=180*dp;ctx.scale(dp,dp);ctx.clearRect(0,0,260,180);
  const mx=Math.max(...dd,60),bw=20,gap=7,sx=20,ch=135,by=155;const mh=Math.ceil(mx/60);
  ctx.fillStyle='#aaa';ctx.font='8px Noto Sans SC';ctx.textAlign='right';
  for(let i=0;i<=mh;i++){const y=by-(i/mh)*ch;ctx.fillText(i+'h',sx-2,y+3);ctx.strokeStyle='#f0f0f0';ctx.beginPath();ctx.moveTo(sx,y);ctx.lineTo(250,y);ctx.stroke()}
  const cl=['#4A90D9','#2ECC71','#F39C12','#9B59B6','#1ABC9C','#E74C3C','#95A5A6'];
  dd.forEach((m,i)=>{const x=sx+i*(bw+gap)+6,h=m/mx*ch,y=by-h;ctx.fillStyle=cl[i];ctx.beginPath();ctx.roundRect?.(x,y,bw,h,3)||ctx.fillRect(x,y,bw,h);ctx.fillStyle='#888';ctx.font='8px Noto Sans SC';ctx.textAlign='center';ctx.fillText(WD[i],x+bw/2,by+11);if(m>0){ctx.fillStyle='#333';ctx.font='bold 8px Noto Sans SC';ctx.fillText((m/60).toFixed(1)+'h',x+bw/2,y-4)}});
}

// Settings
function openSet(){document.getElementById('sbU').value=cfg.su||'';document.getElementById('sbK').value=cfg.sk||'';document.getElementById('wK').value=cfg.wk||'';document.getElementById('wC').value=cfg.wn||'';document.getElementById('sbS').innerHTML=sbc?'<span class="sd ok"></span>已连接':'<span class="sd no"></span>未连接';document.getElementById('wS').innerHTML=cfg.wl?`<span class="sd ok"></span>${cfg.wn||''}`:'<span class="sd no"></span>未配置';document.getElementById('cRes').innerHTML='';document.getElementById('setOv').classList.add('active')}
function clSet(){document.getElementById('setOv').classList.remove('active')}
function expD(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`做事表_${fD(new Date())}.json`;a.click();toast('已导出')}
function impD(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{D=JSON.parse(ev.target.result);saveL();syncU();render();toast('已导入 ✓')}catch(e){toast('格式错误')}};r.readAsText(f);e.target.value=''}
function clrD(){if(!confirm('确定清空？不可恢复！'))return;D={a:[],m:{}};saveL();syncU();render();toast('已清空')}

// Keyboard
document.addEventListener('keydown',e=>{if(e.key==='Escape'){clAM();clSt();clSet();document.getElementById('calOv').classList.remove('active');document.getElementById('mpop').classList.remove('active')}});

// Resize
window.addEventListener('resize',()=>render());

// Init
function init(){
  renderLeg();initSB();updBadge();
  if(cfg.wk&&cfg.wl)fetchW();
  render();
  setTimeout(()=>{const sa=document.getElementById('sa'),now=new Date(),h=now.getHours();if(!isMob()&&h>=0&&h<=23)sa.scrollTop=Math.max(0,(h-2)*RH)},200);
  setInterval(()=>{updateNLine()},60000);
}
init();
</script>
