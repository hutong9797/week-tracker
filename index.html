<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>一周做事表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--text2:#6c757d;--text3:#adb5bd;
  --border:#e8eaed;--accent:#5B7FFF;--accent2:#8B5CF6;--accent-light:#eef1ff;
  --cat-work:#4A90D9;--cat-study:#2ECC71;--cat-fun:#F39C12;
  --cat-life:#9B59B6;--cat-exercise:#1ABC9C;--cat-other:#95A5A6;
  --row-h:44px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh}

/* Header */
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:6px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.hdr-l{display:flex;align-items:center;gap:6px;min-width:0;flex:1}
.hdr h1{font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;cursor:pointer}
.hdr-r{display:flex;align-items:center;gap:5px;flex-shrink:0}

/* View Toggle */
.vtog{display:flex;background:#f0f2f5;border-radius:7px;padding:2px;flex-shrink:0}
.vtog button{padding:4px 10px;border:none;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;background:transparent;color:var(--text2);transition:all .2s;white-space:nowrap}
.vtog button.active{background:var(--card);color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.08)}

.wnav{display:flex;align-items:center;gap:3px}
.wnav button{background:none;border:1px solid var(--border);border-radius:5px;padding:3px 8px;cursor:pointer;font-size:11px;color:var(--text2);transition:all .2s}
.wnav button:active{transform:scale(.95)}
.wnav button:hover{border-color:var(--accent);color:var(--accent)}
.wlbl{font-size:12px;font-weight:500;cursor:pointer;padding:3px 6px;border-radius:5px;white-space:nowrap}
.badge{font-size:9px;padding:1px 6px;border-radius:10px;white-space:nowrap}
.badge.cloud{background:#e8f5e9;color:#2e7d32}
.badge.local{background:#fff3e0;color:#e65100}
.btn-s{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:none;display:flex;align-items:center;gap:2px;transition:opacity .2s}
.btn-s:active{opacity:.7}
.btn-s.pri{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-s.ghost{background:none;border:1px solid var(--border);color:var(--text2)}

/* Legend */
.leg{display:flex;gap:6px;padding:5px 14px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.leg-i{display:flex;align-items:center;gap:2px;font-size:10px;color:var(--text2)}
.leg-d{width:6px;height:6px;border-radius:2px}

/* ========== CALENDAR VIEW ========== */
.cal-view{display:none;padding:12px}
.cal-card{background:var(--card);border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.05);overflow:hidden}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border)}
.cal-nav .cn-title{font-size:14px;font-weight:700;cursor:pointer}
.cal-nav .cn-btns{display:flex;gap:6px}
.cal-nav button{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .2s}
.cal-nav button:hover{border-color:var(--accent);color:var(--accent)}
.cal-nav button:active{transform:scale(.95)}
.cal-month{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:6px 8px}
.cal-wk{font-size:10px;color:var(--text3);text-align:center;padding:4px 0;font-weight:500}
.cal-d{font-size:13px;padding:4px 2px;text-align:center;border-radius:6px;cursor:pointer;transition:all .15s;position:relative;min-height:32px;display:flex;flex-direction:column;align-items:center;gap:1px}
.cal-d:hover{background:var(--accent-light)}
.cal-d:active{transform:scale(.93)}
.cal-d .cd-num{font-weight:500;line-height:1}
.cal-d.today .cd-num{color:var(--accent);font-weight:700}
.cal-d.sel{background:var(--accent);color:#fff!important}
.cal-d.sel .cd-num{color:#fff!important}
.cal-d.om{opacity:.35}
.cal-d .cd-mood{font-size:10px;line-height:1}
.cal-d .cd-dots{display:flex;gap:1px;flex-wrap:wrap;justify-content:center}
.cal-d .cd-dot{width:3px;height:3px;border-radius:50%}
.cal-d.sel .cd-dot{opacity:.7}
/* Day detail panel (below calendar) */
.day-detail{border-top:1px solid var(--border);display:none}
.day-detail.active{display:block}
.dd-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fafbfc;border-bottom:1px solid var(--border)}
.dd-hdr .dd-title{font-size:14px;font-weight:600}
.dd-hdr .dd-info{display:flex;align-items:center;gap:8px}
.dd-hdr .dd-weather{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:3px}
.dd-hdr .dd-mood{font-size:18px;cursor:pointer}
.dd-hdr .dd-empty{font-size:11px;color:var(--text3)}
.dd-timeline{position:relative;max-height:360px;overflow-y:auto}
.dd-tg{display:grid;grid-template-columns:48px 1fr;grid-template-rows:repeat(24,var(--row-h));position:relative}
/* 日历日详情中的事项色块，需要偏移时间标签列的宽度 */
.dd-tg .ab{left:50px;right:2px}
.dd-tl{height:var(--row-h);display:flex;align-items:flex-start;justify-content:center;font-size:10px;color:var(--text3);border-right:1px solid var(--border);border-bottom:1px solid #f5f5f5;padding-top:2px;user-select:none}
.dd-col{position:relative;border-bottom:1px solid #f5f5f5;cursor:pointer;min-height:var(--row-h)}
.dd-col:hover{background:rgba(91,127,255,.03)}
/* Activity summary list */
.dd-list{padding:12px 16px}
.dd-list-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px}
.dd-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.dd-item:hover{background:var(--accent-light);margin:0 -16px;padding:8px 16px;border-radius:6px}
.dd-item:last-child{border:none}
.dd-item .di-color{width:4px;height:28px;border-radius:2px;flex-shrink:0}
.dd-item .di-body{flex:1;min-width:0}
.dd-item .di-name{font-size:13px;font-weight:500}
.dd-item .di-time{font-size:11px;color:var(--text2)}
.dd-item .di-notes{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dd-item .di-mood{font-size:14px}
.dd-tn{position:absolute;left:48px;right:0;height:2px;background:#FF4757;z-index:3;pointer-events:none}
.dd-tn::before{content:'';position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:#FF4757}

/* ========== WEEK VIEW ========== */
.dtabs{display:none;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.dtabs::-webkit-scrollbar{display:none}
.dtabs-inner{display:flex;min-width:100%}
.dtab{flex:1;min-width:0;text-align:center;padding:7px 4px 5px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;-webkit-user-select:none;user-select:none}
.dtab.active{border-bottom-color:var(--accent);background:var(--accent-light)}
.dtab .dn{font-size:10px;color:var(--text2)}
.dtab .dd{font-size:12px;font-weight:600;margin:1px 0}
.dtab .dm{font-size:13px}
.gw{padding:10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.gc{min-width:780px;background:var(--card);border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.05);overflow:hidden}
.dh-row{display:grid;grid-template-columns:40px repeat(7,1fr);border-bottom:2px solid var(--border);background:#fafbfc}
.dh{padding:6px 2px 4px;text-align:center;border-left:1px solid var(--border)}
.dh.today{background:var(--accent-light)}
.dh .dn{font-size:10px;color:var(--text2)}
.dh .dd{font-size:12px;font-weight:600;margin:1px 0;cursor:pointer}
.dh .dd:hover{color:var(--accent)}
.dh .dw{font-size:9px;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:2px;margin-top:1px}
.dh .dmood{font-size:12px;cursor:pointer;display:inline-block}
.dh .dmood:hover{transform:scale(1.2)}
.cc{border-right:1px solid var(--border)}
.sa{overflow-y:auto;max-height:calc(100vh - 140px);max-height:calc(100dvh - 140px);position:relative}
.tg{display:grid;grid-template-columns:40px repeat(7,1fr);position:relative}
.tl{height:var(--row-h);display:flex;align-items:flex-start;justify-content:center;font-size:9px;color:var(--text3);border-right:1px solid var(--border);border-bottom:1px solid #f5f5f5;padding-top:2px;user-select:none}
.dcol{position:relative;border-left:1px solid var(--border)}
.hl{height:var(--row-h);border-bottom:1px solid #f5f5f5;cursor:pointer;transition:background .1s}
.hl:hover{background:rgba(91,127,255,.04)}

/* Mobile Day View */
.mday{display:none;padding:10px}
.mday-grid{background:var(--card);border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.05);overflow:hidden}
.mday-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mday-hdr .mdh-l{font-size:15px;font-weight:600}
.mday-hdr .mdh-r{display:flex;align-items:center;gap:6px}
.mday-hdr .mdh-weather{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:2px}
.mday-hdr .mdh-mood{font-size:18px;cursor:pointer}
.mtime{display:grid;grid-template-columns:44px 1fr;grid-template-rows:repeat(24,var(--row-h));position:relative}
/* 手机日视图事项色块偏移 */
.mtime .ab{left:46px;right:2px}
.mtl{height:var(--row-h);display:flex;align-items:flex-start;justify-content:center;font-size:10px;color:var(--text3);border-right:1px solid var(--border);border-bottom:1px solid #f5f5f5;padding-top:2px;user-select:none}
.mcol{position:relative;border-bottom:1px solid #f5f5f5}
.mcol:active{background:rgba(91,127,255,.03)}

/* Activity Blocks */
.ab{position:absolute;left:2px;right:2px;border-radius:5px;padding:2px 6px;font-size:11px;cursor:pointer;overflow:hidden;z-index:2;transition:box-shadow .2s;border-left:3px solid;line-height:1.3}
.ab:hover{box-shadow:0 3px 10px rgba(0,0,0,.12);z-index:5}
.ab:active{transform:scale(.98)}
.ab .an{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ab .at{font-size:9px;opacity:.75}
.ab .am{position:absolute;top:2px;right:4px;font-size:10px}
.ab .ad{position:absolute;bottom:2px;right:4px;width:4px;height:4px;border-radius:50%;background:rgba(0,0,0,.25)}
.tn{position:absolute;left:40px;right:0;height:2px;background:#FF4757;z-index:3;pointer-events:none}
.tn::before{content:'';position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:#FF4757}

/* Modals */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.mo.active{display:flex}
.md{background:var(--card);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:440px;max-height:85vh;max-height:85dvh;overflow-y:auto;animation:mIn .25s ease}
@keyframes mIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}
.md h2{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.cb{width:28px;height:28px;border-radius:50%;border:none;background:#f0f0f0;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.cb:hover{background:#e0e0e0}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:500;margin-bottom:4px;color:var(--text2)}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:50px}
.fr{display:flex;gap:8px}
.fr .fg{flex:1}
.co{display:flex;flex-wrap:wrap;gap:5px}
.co-i{padding:5px 11px;border-radius:14px;font-size:11px;font-weight:500;cursor:pointer;border:2px solid transparent;transition:all .12s;user-select:none}
.co-i:active{transform:scale(.95)}
.co-i.sel{border-color:rgba(0,0,0,.3)}
.moo{display:flex;gap:5px;flex-wrap:wrap}
.mo-i{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:2px solid transparent;transition:all .12s;background:#f8f9fa}
.mo-i:active{transform:scale(.9)}
.mo-i.sel{border-color:var(--accent);background:var(--accent-light)}
.bg{display:flex;gap:8px;margin-top:14px}
.b{padding:9px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.b:active{transform:scale(.95)}
.b-p{background:var(--accent);color:#fff}
.b-d{background:#FF4757;color:#fff}
.b-s{background:#f0f0f0;color:var(--text2)}

/* Mood popup */
.mpop{position:fixed;z-index:50;background:var(--card);border-radius:10px;padding:8px;box-shadow:0 6px 20px rgba(0,0,0,.12);display:none;flex-wrap:wrap;gap:3px;width:170px}
.mpop.active{display:flex}
.mpop .mp{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:transform .12s;border:2px solid transparent}
.mpop .mp:active{transform:scale(.85)}
.mpop .mpc{font-size:11px;color:var(--text2);background:#f0f0f0}

/* Stats */
.sp{background:var(--card);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:700px;max-height:85vh;max-height:85dvh;overflow-y:auto;animation:mIn .25s ease}
.sp h2{font-size:16px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sc{background:#f8f9fa;border-radius:10px;padding:14px}
.sc h3{font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text2)}
.sc canvas{width:100%!important;height:auto!important}
.ss{margin-top:14px;background:linear-gradient(135deg,var(--accent-light),#f0e6ff);border-radius:10px;padding:14px}
.ss h3{font-size:12px;font-weight:600;margin-bottom:8px}
.si{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px}
.si-i{text-align:center;padding:8px;background:var(--card);border-radius:7px}
.si-i .v{font-size:18px;font-weight:700;color:var(--accent)}
.si-i .l{font-size:9px;color:var(--text2);margin-top:2px}
.csl{list-style:none}
.csl li{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.csl li:last-child{border:none}
.csl .cc2{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.csl .cn2{flex:1}.csl .ch{font-weight:600}.csl .cp{color:var(--text2);font-size:10px;min-width:32px;text-align:right}
.ms{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.mc{display:flex;align-items:center;gap:3px;font-size:12px;padding:3px 8px;background:var(--card);border-radius:14px}
.mc span{font-weight:600}

/* Settings */
.setp .fg{margin-bottom:10px}
.setp .ht{font-size:9px;color:var(--text3);margin-top:2px;line-height:1.3}
.setsec{border-top:1px solid var(--border);padding-top:10px;margin-top:10px}
.setsec h3{font-size:12px;font-weight:600;margin-bottom:6px;color:var(--accent)}
.bsm{padding:5px 12px;font-size:11px;border-radius:6px;cursor:pointer;border:none;font-weight:500}
.bsm.p{background:var(--accent);color:#fff}
.bsm.w{background:#FF4757;color:#fff}
.bsm.g{background:#f0f0f0;color:var(--text2)}
.sd{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px}
.sd.ok{background:#2ECC71}.sd.no{background:#FF4757}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:7px 18px;border-radius:20px;font-size:12px;z-index:300;animation:tIn .3s ease;pointer-events:none;white-space:nowrap}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

@media(max-width:768px){
  .hdr{padding:8px 10px;gap:4px}
  .hdr h1{font-size:13px}
  .wnav button{padding:2px 6px;font-size:10px}
  .wlbl{font-size:10px}
  .badge{display:none}
  .btn-s{padding:4px 8px;font-size:10px}
  .vtog button{padding:3px 7px;font-size:10px}
  .leg{padding:3px 10px;gap:4px}
  .leg-i{font-size:9px}
  .dtabs{display:block}
  .gw{display:none}
  .mday{display:block}
  .md,.sp{border-radius:16px 16px 0 0;max-width:100%;width:100%}
  .sg{grid-template-columns:1fr}
  .cal-d{padding:3px 1px;min-height:28px;font-size:11px}
  .cal-d .cd-num{font-size:11px}
  .cal-d .cd-mood{font-size:8px}
  .cal-d .cd-dot{width:3px;height:3px}
}
@media(min-width:769px){
  .dtabs{display:none}
  .mday{display:none}
  .gw{display:block}
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <h1 onclick="switchView('cal')">📋 一周做事表</h1>
    <div class="vtog">
      <button class="active" id="vtogCal" onclick="switchView('cal')">📅 日历</button>
      <button id="vtogWk" onclick="switchView('week')">📊 周视图</button>
    </div>
    <div class="wnav" id="wnavWk">
      <button onclick="chWeek(-1)">◀</button>
      <span class="wlbl" id="wlbl"></span>
      <button onclick="chWeek(1)">▶</button>
    </div>
    <span class="badge local" id="sbadge">📁 本地</span>
  </div>
  <div class="hdr-r">
    <button class="btn-s ghost" onclick="openSet()">⚙️</button>
    <button class="btn-s pri" onclick="showSt()">📊 统计</button>
  </div>
</div>

<div class="leg" id="leg"></div>

<!-- Calendar View -->
<div class="cal-view" id="calView">
  <div class="cal-card">
    <div class="cal-nav">
      <div class="cn-btns"><button onclick="calPrev()">◀ 上月</button></div>
      <span class="cn-title" id="calTitle"></span>
      <div class="cn-btns"><button onclick="calNext()">下月 ▶</button><button onclick="calToday()">今天</button></div>
    </div>
    <div class="cal-month" id="calMonth"></div>
    <div class="day-detail" id="dayDetail"></div>
  </div>
</div>

<!-- Mobile Day Tabs (week view) -->
<div class="dtabs" id="dtabs"><div class="dtabs-inner" id="dtabsIn"></div></div>

<!-- Desktop Week View -->
<div class="gw" id="gwWrap"><div class="gc">
  <div class="dh-row" id="dhRow"></div>
  <div class="sa" id="sa"><div class="tg" id="tg"></div><div class="tn" id="tnl" style="display:none"></div></div>
</div></div>

<!-- Mobile Day View -->
<div class="mday" id="mday"></div>

<!-- Act Modal -->
<div class="mo" id="aMo">
  <div class="md">
    <h2><span id="mTi">添加事项</span><button class="cb" onclick="clAM()">✕</button></h2>
    <input type="hidden" id="eId"><input type="hidden" id="eDt">
    <div class="fg"><label>事项名称</label><input id="aNm" placeholder="写周报、读论文…"></div>
    <div class="fg"><label>分类</label><div class="co" id="cOpt"></div></div>
    <div class="fr">
      <div class="fg"><label>开始时间</label><select id="aSt"></select></div>
      <div class="fg"><label>结束时间</label><select id="aEn"></select></div>
    </div>
    <div class="fg"><label>心情</label><div class="moo" id="mOpt"></div></div>

<script>
const CATS=[{key:'work',name:'工作',color:'#4A90D9'},{key:'study',name:'学习',color:'#2ECC71'},{key:'fun',name:'娱乐',color:'#F39C12'},{key:'life',name:'生活',color:'#9B59B6'},{key:'exercise',name:'运动',color:'#1ABC9C'},{key:'other',name:'其他',color:'#95A5A6'}];
const MOODS=[{key:'happy',emoji:'😊',name:'开心'},{key:'calm',emoji:'😌',name:'平静'},{key:'focused',emoji:'🧐',name:'专注'},{key:'tired',emoji:'😴',name:'疲惫'},{key:'anxious',emoji:'😰',name:'焦虑'},{key:'sad',emoji:'😢',name:'低落'},{key:'upset',emoji:'😤',name:'烦躁'}];
const WD=['周一','周二','周三','周四','周五','周六','周日'];
const WDS=['一','二','三','四','五','六','日'];
const RH=44,TH=24;
const WIC={100:'☀️',101:'🌤️',102:'⛅',103:'🌥️',104:'☁️',300:'🌧️',301:'⛈️',305:'🌦️',306:'🌧️',307:'🌧️',400:'🌨️',500:'🌫️',501:'🌫️',502:'🌫️'};

let curView='cal',cWk=getMon(new Date()),calM=new Date(),mobDay=0,selDate=null;
let D=loadL(),WD2={},sbc=null,sCat='work',sMood='',cfg=getCfg();

function getMon(d){d=new Date(d);const day=d.getDay();return new Date(d.getFullYear(),d.getMonth(),d.getDate()-day+(day===0?-6:1))}
function fD(d){return d.getFullYear()+'-'+S(d.getMonth()+1)+'-'+S(d.getDate())}
function fDC(d){return(d.getMonth()+1)+'/'+d.getDate()}
function fDF(d){return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 '+WD[d.getDay()===0?6:d.getDay()-1]}
function S(n){return String(n).padStart(2,'0')}
function wDates(m){const r=[];for(let i=0;i<7;i++){const d=new Date(m);d.setDate(d.getDate()+i);r.push(d)}return r}
function wStr(m){const s=new Date(m);s.setDate(s.getDate()+6);return fDC(m)+' — '+fDC(s)}
function gId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function isTd(d){return fD(d)===fD(new Date())}
function mT(m){return S(Math.floor(m/60))+':'+S(m%60)}
function toast(s){const e=document.createElement('div');e.className='toast';e.textContent=s;document.body.appendChild(e);setTimeout(()=>e.remove(),2200)}
function loadL(){try{return JSON.parse(localStorage.getItem('wt2'))||{a:[],m:{}}}catch(e){return{a:[],m:{}}}}
function saveL(){localStorage.setItem('wt2',JSON.stringify(D))}
function dayA(ds){return D.a.filter(a=>a.date===ds).sort((a,b)=>a.s-a.e)}
function wkA(m){const ds=wDates(m).map(fD);return D.a.filter(a=>ds.includes(a.date))}
function getM(ds){return D.m[ds]||''}
function setM(ds,m){if(m)D.m[ds]=m;else delete D.m[ds];saveL();syncU();render()}
function getCfg(){try{const c=JSON.parse(localStorage.getItem('wt2_cfg'))||{};if(!c.su)c.su='https://fumgeprorccelgbojusk.supabase.co';if(!c.sk)c.sk='sb_publishable_PPI3-QnqjZ5XAglnh8JCLg_sfr0NIiY';if(!c.wk)c.wk='759f4736e28e4939a8fe53e9db677bd3';if(!c.wl){c.wl='101120101';c.wn='济南'}return c}catch(e){return{su:'https://fumgeprorccelgbojusk.supabase.co',sk:'sb_publishable_PPI3-QnqjZ5XAglnh8JCLg_sfr0NIiY',wk:'759f4736e28e4939a8fe53e9db677bd3',wl:'101120101',wn:'济南'}}}
function saveCfg(){localStorage.setItem('wt2_cfg',JSON.stringify(cfg))}
function isMob(){return window.innerWidth<=768}
function parseD(s){const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}

// Supabase
function initSB(){if(!cfg.su||!cfg.sk){sbc=null;return}try{sbc=supabase.createClient(cfg.su,cfg.sk)}catch(e){sbc=null}}
async function syncD(){if(!sbc)return;try{const{data:d1}=await sbc.from('activities').select('*');const{data:d2}=await sbc.from('day_moods').select('*');if(d1)D.a=d1.map(r=>({id:r.id,date:r.date,name:r.name,cat:r.category,s:r.start_min,e:r.end_min,mood:r.mood,notes:r.notes}));if(d2)D.m=Object.fromEntries(d2.map(r=>[r.date,r.mood]));saveL();render()}catch(e){console.error(e)}}
async function syncU(){if(!sbc)return;try{const rows=D.a.map(a=>({id:a.id,date:a.date,name:a.name,category:a.cat,start_min:a.s,end_min:a.e,mood:a.mood||null,notes:a.notes||null}));if(rows.length)await sbc.from('activities').upsert(rows,{onConflict:'id'});const mr=Object.entries(D.m).map(([date,mood])=>({date,mood}));if(mr.length)await sbc.from('day_moods').upsert(mr,{onConflict:'date'})}catch(e){console.error(e)}}
async function connSB(){const u=document.getElementById('sbU').value.trim(),k=document.getElementById('sbK').value.trim();if(!u||!k){toast('请填写 URL 和 Key');return}cfg.su=u;cfg.sk=k;saveCfg();initSB();if(sbc){try{await sbc.from('activities').select('id').limit(1);document.getElementById('sbS').innerHTML='<span class="sd ok"></span>已连接';await syncD();toast('同步完成 ✓')}catch(e){document.getElementById('sbS').innerHTML='<span class="sd no"></span>数据表未创建'}}updBadge()}
function disSB(){cfg.su='';cfg.sk='';saveCfg();sbc=null;updBadge();document.getElementById('sbS').innerHTML='<span class="sd no"></span>未连接';toast('已断开')}
function updBadge(){const b=document.getElementById('sbadge');if(sbc){b.className='badge cloud';b.textContent='☁️ 同步'}else{b.className='badge local';b.textContent='📁 本地'}}

// Weather
async function srcCity(){const k=cfg.wk||document.getElementById('wK').value.trim(),c=document.getElementById('wC').value.trim();if(!k||!c){toast('请填写 Key 和城市');return}cfg.wk=k;saveCfg();try{const r=await fetch(`https://geoapi.qweather.com/v2/city/lookup?location=${encodeURIComponent(c)}&key=${k}`);const d=await r.json();if(d.code==='200'&&d.location.length){document.getElementById('cRes').innerHTML=d.location.slice(0,5).map(l=>`<div style="padding:5px 8px;cursor:pointer;border-radius:4px;margin:2px 0" onclick="selCity('${l.id}','${l.name}')">${l.name} (${l.adm2||l.adm1})</div>`).join('')}else toast('未找到城市')}catch(e){toast('搜索失败')}}
function selCity(id,n){cfg.wl=id;cfg.wn=n;saveCfg();document.getElementById('cRes').innerHTML=`<span class="sd ok"></span>${n}`;document.getElementById('wC').value=n;fetchW()}
async function fetchW(){if(!cfg.wk||!cfg.wl)return;try{const r=await fetch(`https://devapi.qweather.com/v7/weather/7d?location=${cfg.wl}&key=${cfg.wk}`);const d=await r.json();if(d.code==='200'){WD2=Object.fromEntries(d.daily.map(x=>[x.fxDate,x]));render()}}catch(e){}}
function wI(c){return WIC[c]||'🌡️'}

function renderLeg(){document.getElementById('leg').innerHTML=CATS.map(c=>`<div class="leg-i"><div class="leg-d" style="background:${c.color}"></div>${c.name}</div>`).join('')}

// ========== VIEW SWITCHING ==========
function switchView(v){
  curView=v;
  document.getElementById('vtogCal').className=v==='cal'?'active':'';
  document.getElementById('vtogWk').className=v==='week'?'active':'';
  document.getElementById('calView').style.display=v==='cal'?'block':'none';
  document.getElementById('wnavWk').style.display=v==='week'?'flex':'none';
  if(v==='cal'){
    renderCalView();
    document.getElementById('gwWrap').style.display='none';
    document.getElementById('dtabs').style.display='none';
    document.getElementById('mday').style.display='none';
  }else{
    document.getElementById('dayDetail')?.classList.remove('active');
    // 清除inline style让CSS媒体查询重新生效
    document.getElementById('dtabs').style.display='';
    document.getElementById('mday').style.display='';
    document.getElementById('gwWrap').style.display='';
    renderWkView();
  }
}

// ========== CALENDAR VIEW ==========
function renderCalView(){
  const y=calM.getFullYear(),m=calM.getMonth();
  document.getElementById('calTitle').textContent=y+'年'+(m+1)+'月';
  const g=document.getElementById('calMonth');
  let h=WDS.map(w=>`<div class="cal-wk">${w}</div>`).join('');
  const f=new Date(y,m,1),sd=f.getDay()||7;
  const st=new Date(f);st.setDate(st.getDate()-(sd-1));
  for(let i=0;i<42;i++){
    const d=new Date(st);d.setDate(d.getDate()+i);const ds=fD(d);
    const acts=dayA(ds);
    const mood=getM(ds);const moodE=mood?MOODS.find(m2=>m2.key===mood)?.emoji||'':'';
    // Collect category dots
    const catSet=new Set(acts.map(a=>a.cat));
    const dots=CATS.filter(c=>catSet.has(c.key)).map(c=>`<span class="cd-dot" style="background:${c.color}"></span>`).join('');
    let cls='cal-d';
    if(d.getMonth()!==m)cls+=' om';
    if(isTd(d))cls+=' today';
    if(selDate===ds)cls+=' sel';
    h+=`<div class="${cls}" onclick="selectDay('${ds}')">
      <span class="cd-num">${d.getDate()}</span>
      ${moodE?`<span class="cd-mood">${moodE}</span>`:''}
      ${dots?`<div class="cd-dots">${dots}</div>`:''}
    </div>`;
  }
  g.innerHTML=h;
  // Render day detail
  renderDayDetail();
}
function selectDay(ds){
  selDate=ds;
  renderCalView();
  // Scroll to detail
  const dd=document.getElementById('dayDetail');
  if(dd.classList.contains('active')){setTimeout(()=>dd.scrollIntoView({behavior:'smooth',block:'nearest'}),50)}
}
function calPrev(){calM.setMonth(calM.getMonth()-1);renderCalView()}
function calNext(){calM.setMonth(calM.getMonth()+1);renderCalView()}
function calToday(){calM=new Date();selDate=fD(new Date());renderCalView()}

function renderDayDetail(){
  const dd=document.getElementById('dayDetail');
  if(!selDate){dd.classList.remove('active');return}
  const d=parseD(selDate);
  const acts=dayA(selDate);
  const mood=getM(selDate);const moodE=mood?MOODS.find(m=>m.key===mood)?.emoji||'':'';
  const w=WD2[selDate];
  const totalMin=acts.reduce((s,a)=>s+(a.e-a.s),0);

  let h=`<div class="dd-hdr">
    <div class="dd-title">${fDF(d)}</div>
    <div class="dd-info">
      ${w?`<span class="dd-weather">${wI(w.iconDay)} ${w.tempMin}°~${w.tempMax}°</span>`:''}
      <span class="dd-mood" onclick="openMP(event,'${selDate}')">${moodE||'➕ 心情'}</span>
      ${acts.length?`<span style="font-size:11px;color:var(--text2)">${(totalMin/60).toFixed(1)}h</span>`:`<span class="dd-empty">暂无事项，双击时间轴添加</span>`}
    </div>
  </div>`;

  // Timeline
  h+=`<div class="dd-timeline"><div class="dd-tg" style="position:relative">`;
  for(let hr=0;hr<TH;hr++){
    h+=`<div class="dd-tl">${S(hr)}:00</div><div class="dd-col" ondblclick="openAdd('${selDate}',${hr})"></div>`;
  }
  acts.forEach(a=>{
    const cat=CATS.find(c=>c.key===a.cat)||CATS[5];
    const top=(a.s/60)*RH,bot=(a.e/60)*RH,ht=Math.max(bot-top,18);
    const meE=a.mood?MOODS.find(m=>m.key===a.mood)?.emoji||'':'';
    const ts=mT(a.s)+'-'+mT(a.e);
    h+=`<div class="ab" style="top:${top}px;height:${ht}px;background:${cat.color}18;border-left-color:${cat.color};color:${cat.color}" onclick="openEdit('${a.id}')" title="${a.name}\n${ts}${a.notes?'\n'+a.notes:''}"><span class="an">${a.name}</span>${ht>26?`<div class="at">${ts}</div>`:''}${meE?`<span class="am">${meE}</span>`:''}${a.notes&&ht>36?`<span class="ad"></span>`:''}</div>`;
  });
  h+=`</div></div>`;

  // Activity list
  if(acts.length){
    h+=`<div class="dd-list"><div class="dd-list-title">📋 事项列表</div>`;
    acts.forEach(a=>{
      const cat=CATS.find(c=>c.key===a.cat)||CATS[5];
      const meE=a.mood?MOODS.find(m=>m.key===a.mood)?.emoji||'':'';
      h+=`<div class="dd-item" onclick="openEdit('${a.id}')">
        <div class="di-color" style="background:${cat.color}"></div>
        <div class="di-body"><div class="di-name">${a.name}</div><div class="di-time">${mT(a.s)} - ${mT(a.e)} · ${cat.name} · ${(a.e-a.s)/60}h</div>${a.notes?`<div class="di-notes">📝 ${a.notes}</div>`:''}</div>
        ${meE?`<span class="di-mood">${meE}</span>`:''}
      </div>`;
    });
    h+=`</div>`;
  }

  dd.innerHTML=h;
  dd.classList.add('active');

  // Now line
  const now=new Date();
  if(fD(now)===selDate){
    const cm=now.getHours()*60+now.getMinutes();
    const tg2=dd.querySelector('.dd-tg');
    if(tg2){
      const nl=document.createElement('div');nl.className='dd-tn';
      nl.style.top=(cm/60)*RH+'px';tg2.appendChild(nl);
    }
  }
}

// ========== WEEK VIEW ==========
function renderWkView(){
  const dates=wDates(cWk);
  document.getElementById('wlbl').textContent=wStr(cWk);
  renderDTabs(dates);
  if(isMob()){renderMDay(dates)}else{renderWk(dates)}
}

function renderDTabs(dates){
  document.getElementById('dtabsIn').innerHTML=dates.map((d,i)=>{
    const me=getM(fD(d));const meE=me?MOODS.find(m=>m.key===me)?.emoji||'':'';
    return`<div class="dtab ${i===mobDay?'active':''}" onclick="mobDay=${i};renderWkView()"><div class="dn">${WD[i]}</div><div class="dd">${fDC(d)}</div><div class="dm">${meE||''}</div></div>`;
  }).join('');
}

function renderMDay(dates){
  const d=dates[mobDay]||dates[0],ds=fD(d),acts=dayA(ds);
  const me=getM(ds),meE=me?MOODS.find(m=>m.key===me)?.emoji||'':'';
  const w=WD2[ds],wH=w?`<span class="mdh-weather">${wI(w.iconDay)} ${w.tempMin}°~${w.tempMax}°</span>`:'';
  let h=`<div class="mday-grid"><div class="mday-hdr"><div class="mdh-l">${WD[mobDay]} ${fDC(d)}</div><div class="mdh-r">${wH}<span class="mdh-mood" onclick="openMP(event,'${ds}')">${meE||'➕'}</span></div></div><div class="mtime" style="position:relative">`;
  for(let hr=0;hr<TH;hr++){h+=`<div class="mtl">${S(hr)}:00</div><div class="mcol" ondblclick="openAdd('${ds}',${hr})" ontouchstart="mTouch(event,'${ds}',${hr})"></div>`}
  acts.forEach(a=>{const cat=CATS.find(c=>c.key===a.cat)||CATS[5];const top=(a.s/60)*RH,bot=(a.e/60)*RH,ht=Math.max(bot-top,18);const me2=a.mood?MOODS.find(m=>m.key===a.mood)?.emoji||'':'';const ts=mT(a.s)+'-'+mT(a.e);h+=`<div class="ab" style="top:${top}px;height:${ht}px;background:${cat.color}18;border-left-color:${cat.color};color:${cat.color}" onclick="openEdit('${a.id}')" title="${a.name}\n${ts}${a.notes?'\n'+a.notes:''}"><span class="an">${a.name}</span>${ht>26?`<div class="at">${ts}</div>`:''}${me2?`<span class="am">${me2}</span>`:''}${a.notes&&ht>36?`<span class="ad"></span>`:''}</div>`});
  h+=`</div></div>`;
  document.getElementById('mday').innerHTML=h;
}

let mTT=null;
function mTouch(e,ds,hr){if(mTT)clearTimeout(mTT);mTT=setTimeout(()=>openAdd(ds,hr),400)}
document.addEventListener('touchend',()=>{if(mTT){clearTimeout(mTT);mTT=null}});

function renderWk(dates){
  const dhr=document.getElementById('dhRow');let hh='<div class="cc"></div>';
  dates.forEach((d,i)=>{const td=isTd(d)?'today':'';const ds=fD(d);const me=getM(ds),meE=me?MOODS.find(m=>m.key===me)?.emoji||'':'';const w=WD2[ds],wH=w?`<div class="dw"><span>${wI(w.iconDay)}</span><span>${w.tempMin}~${w.tempMax}°</span></div>`:'';hh+=`<div class="dh ${td}"><div class="dn">${WD[i]}</div><div class="dd" onclick="switchView('cal');selDate='${ds}';renderCalView()">${fDC(d)}</div>${wH}<div class="dmood" onclick="openMP(event,'${ds}')">${meE||'➕'}</div></div>`});
  dhr.innerHTML=hh;
  const tg=document.getElementById('tg');tg.style.gridTemplateColumns=`40px repeat(7,1fr)`;tg.style.gridTemplateRows=`repeat(${TH},${RH}px)`;tg.innerHTML='';
  for(let h=0;h<TH;h++){const tl=document.createElement('div');tl.className='tl';tl.textContent=S(h)+':00';tl.style.gridRow=h+1;tl.style.gridColumn=1;tg.appendChild(tl)}
  dates.forEach((d,ci)=>{const ds=fD(d),acts=dayA(ds);const col=document.createElement('div');col.className='dcol';col.style.gridRow='1/-1';col.style.gridColumn=ci+2;col.style.position='relative';for(let h=0;h<TH;h++){const l=document.createElement('div');l.className='hl';l.ondblclick=()=>openAdd(ds,h);col.appendChild(l)}
  acts.forEach(a=>{const cat=CATS.find(c=>c.key===a.cat)||CATS[5];const top=(a.s/60)*RH,bot=(a.e/60)*RH,ht=Math.max(bot-top,18);const meE=a.mood?MOODS.find(m=>m.key===a.mood)?.emoji||'':'';const ts=mT(a.s)+'-'+mT(a.e);const bk=document.createElement('div');bk.className='ab';bk.style.cssText=`top:${top}px;height:${ht}px;background:${cat.color}18;border-left-color:${cat.color};color:${cat.color}`;bk.onclick=()=>openEdit(a.id);let inn=`<span class="an">${a.name}</span>`;if(ht>26)inn+=`<div class="at">${ts}</div>`;if(meE)inn+=`<span class="am">${meE}</span>`;if(a.notes&&ht>36)inn+=`<span class="ad"></span>`;bk.innerHTML=inn;col.appendChild(bk)});tg.appendChild(col)});
  updateNLine();
}

// Stats
function showSt(){renderSt();document.getElementById('stOv').classList.add('active')}
function clSt(){document.getElementById('stOv').classList.remove('active')}
function renderSt(){
  const acts=wkA(cWk),dates=wDates(cWk).map(fD);
  const cs={};CATS.forEach(c=>{cs[c.key]={...c,t:0,n:0}});
  acts.forEach(a=>{if(cs[a.cat]){cs[a.cat].t+=(a.e-a.s);cs[a.cat].n++}});
  const tt=Object.values(cs).reduce((s,c)=>s+c.t,0);
  drawPie(cs,tt);
  document.getElementById('csL').innerHTML=CATS.map(c=>{const s=cs[c.key],h=(s.t/60).toFixed(1),p=tt?Math.round(s.t/tt*100):0;return s.t>0?`<li><div class="cc2" style="background:${c.color}"></div><div class="cn2">${c.name}(${s.n}项)</div><div class="ch">${h}h</div><div class="cp">${p}%</div></li>`:''}).filter(Boolean).join('')||'<li style="color:var(--text2);font-size:11px">暂无数据</li>';
  const dd=dates.map(d=>acts.filter(a=>a.date===d).reduce((s,a)=>s+(a.e-a.s),0));drawBar(dd);
  const mc={};MOODS.forEach(m=>{mc[m.key]={...m,n:0}});acts.forEach(a=>{if(a.mood&&mc[a.mood])mc[a.mood].n++});dates.forEach(d=>{const mk=getM(d);if(mk&&mc[mk])mc[mk].n++});
  document.getElementById('mSum').innerHTML=MOODS.filter(m=>mc[m.key].n>0).map(m=>`<div class="mc">${m.emoji}<span>${mc[m.key].n}</span></div>`).join('')||'<span style="color:var(--text2);font-size:11px">暂无</span>';
  const mc2=Object.values(cs).sort((a,b)=>b.t-a.t)[0],bd=dd.indexOf(Math.max(...dd));
  document.getElementById('sumI').innerHTML=`<div class="si-i"><div class="v">${(tt/60).toFixed(1)}h</div><div class="l">总时长</div></div><div class="si-i"><div class="v">${acts.length}</div><div class="l">事项数</div></div><div class="si-i"><div class="v">${mc2&&mc2.t>0?mc2.name:'-'}</div><div class="l">最多分类</div></div><div class="si-i"><div class="v">${bd>=0?WD[bd]:'-'}</div><div class="l">最忙天</div></div>`;
}
function drawPie(cs,tt){const cv=document.getElementById('pieC'),ctx=cv.getContext('2d'),dp=window.devicePixelRatio||1;cv.width=260*dp;cv.height=260*dp;ctx.scale(dp,dp);ctx.clearRect(0,0,260,260);if(!tt){ctx.fillStyle='#ccc';ctx.font='12px Noto Sans SC';ctx.textAlign='center';ctx.fillText('暂无数据',130,133);return}const cx=130,cy=125,r=82;let sa=-Math.PI/2;CATS.forEach(c=>{const s=cs[c.key];if(!s.t)return;const sl=(s.t/tt)*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,sa,sa+sl);ctx.closePath();ctx.fillStyle=c.color;ctx.fill();const p=Math.round(s.t/tt*100);if(p>=5){const ma=sa+sl/2;ctx.fillStyle='#fff';ctx.font='bold 9px Noto Sans SC';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p+'%',cx+Math.cos(ma)*r*.6,cy+Math.sin(ma)*r*.6)}sa+=sl});ctx.beginPath();ctx.arc(cx,cy,r*.45,0,Math.PI*2);ctx.fillStyle='#f8f9fa';ctx.fill();ctx.fillStyle='#1a1a2e';ctx.font='bold 15px Noto Sans SC';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText((tt/60).toFixed(1)+'h',cx,cy-4);ctx.fillStyle='#6c757d';ctx.font='9px Noto Sans SC';ctx.fillText('总时长',cx,cy+10)}
function drawBar(dd){const cv=document.getElementById('barC'),ctx=cv.getContext('2d'),dp=window.devicePixelRatio||1;cv.width=260*dp;cv.height=180*dp;ctx.scale(dp,dp);ctx.clearRect(0,0,260,180);const mx=Math.max(...dd,60),bw=20,gap=7,sx=20,ch=135,by=155,mh=Math.ceil(mx/60);ctx.fillStyle='#aaa';ctx.font='8px Noto Sans SC';ctx.textAlign='right';for(let i=0;i<=mh;i++){const y=by-(i/mh)*ch;ctx.fillText(i+'h',sx-2,y+3);ctx.strokeStyle='#f0f0f0';ctx.beginPath();ctx.moveTo(sx,y);ctx.lineTo(250,y);ctx.stroke()}const cl=['#4A90D9','#2ECC71','#F39C12','#9B59B6','#1ABC9C','#E74C3C','#95A5A6'];dd.forEach((m,i)=>{const x=sx+i*(bw+gap)+6,h=m/mx*ch,y=by-h;ctx.fillStyle=cl[i];ctx.beginPath();ctx.roundRect?.(x,y,bw,h,3)||ctx.fillRect(x,y,bw,h);ctx.fillStyle='#888';ctx.font='8px Noto Sans SC';ctx.textAlign='center';ctx.fillText(WD[i],x+bw/2,by+11);if(m>0){ctx.fillStyle='#333';ctx.font='bold 8px Noto Sans SC';ctx.fillText((m/60).toFixed(1)+'h',x+bw/2,y-4)}})}
